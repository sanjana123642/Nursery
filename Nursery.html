<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flower Nursery</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f0fff4;
    margin:0;
}

/* Header */
header{
    background-color:#4CAF50;
    color:white;
    text-align:center;
    padding:20px;
}

/* Flower section */
.container{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:30px;
}

/* Flower cards */
.flower{
    background:white;
    border:1px solid #ddd;
    border-radius:10px;
    width:200px;
    text-align:center;
    padding:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.flower img{
    width:100%;
    border-radius:10px;
}

.flower h3{
    color:#2e7d32;
}

footer{
    text-align:center;
    background:#4CAF50;
    color:white;
    padding:10px;
}
</style>
</head>

<body>

<header>
<h1>Welcome to Flower Nursery</h1>
<p>Beautiful flowers for your garden</p>
</header>

<div class="container">

<div class="flower">
<img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" alt="Rose">
<h3>Rose</h3>
<p>Price: ₹50</p>
</div>

<div class="flower">
<img src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde" alt="Sunflower">
<h3>Sunflower</h3>
<p>Price: ₹40</p>
</div>

<div class="flower">
<img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946" alt="Tulip">
<h3>Tulip</h3>
<p>Price: ₹60</p>
</div>

</div>

<footer>
<p>© 2026 Flower Nursery</p>
</footer>

</body>
</html>
